# claude-indexing configuration. Copy to config.yaml and edit, or pass --config.
# All values shown are defaults; omit any key to keep the default.

languages: [vi, en]          # languages to index/normalize for
ocr: auto                    # auto | on | off  (auto = OCR only when no text layer)
sidecar: mirror              # mirror | inplace | none  (Windows Explorer .txt sidecars)
workers: 8                   # parallel extraction threads
max_bytes: 104857600         # 100 MB: files larger than this are indexed by name only
max_chars: 1000000           # cap extracted characters per file
hash: false                  # compute sha1 (slower); false = use size+mtime as change key
ocr_max_pages: 20            # max PDF pages to OCR per file

# Tesseract
tesseract_cmd: "C:\\Program Files\\Tesseract-OCR\\tesseract.exe"
tessdata_dir: ""             # blank = use ./data/tessdata then system tessdata
ocr_langs: "vie+eng"          # add installed packs later, e.g. vie+eng+rus

# Dictionaries (fetched by scripts/fetch_data.py)
dict_dir: "data/dict"        # holds en_US.dic/.aff, vi_VN.dic/.aff, vi_words.txt
abbreviations:
  - "data/abbreviations_en.txt"
  - "data/abbreviations_vi.txt"

# Skip rules
skip_dirs:
  - "$RECYCLE.BIN"
  - "System Volume Information"
  - ".git"
  - "$WinREAgent"
  - "Windows"
  - "node_modules"
  - "index_out"        # never index our own output
  - ".venv"
  - "venv"
  - "site-packages"
  - "__pycache__"
skip_exts:                   # never open for content (still indexed by name)
  - ".sys"
  - ".dll"
  - ".exe"
  - ".iso"
  - ".vmdk"
  - ".lock"
follow_symlinks: false       # never follow junctions/symlinks (avoids loops)

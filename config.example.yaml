# llm-index configuration. Copy to config.yaml and edit, or pass --config.
# All values shown are defaults; omit any key to keep the default.

languages: [vi, en]          # languages to index/normalize for
ocr: auto                    # auto | on | off | exhaustive
sidecar: mirror              # mirror | inplace | none
workers: 8                   # parallel extraction threads
max_bytes: 104857600         # 100 MB: files larger than this are indexed by name only
max_chars: 1000000           # cap extracted characters per file
hash: false                  # compute sha1 (slower); false = use size+mtime as change key
ocr_max_pages: 20            # max PDF pages to OCR per file

# Tesseract
tesseract_cmd: tesseract
ocr_langs: "vie+eng"

# Dictionaries are fetched with: llm-index fetch-data --data-dir data
data_dir: data

# Local media transcription and semantic embeddings. The container image bakes
# these artifacts in; native installs must fetch/place them before indexing.
whisper_model: models/ggml-small.bin
embedding_cache: models/fastembed
embedding_model: intfloat/multilingual-e5-small

# Skip rules
#
# skip_dirs matches a bare directory BASENAME anywhere in the tree. Use it for
# names that are junk wherever they appear (node_modules, __pycache__). Do NOT
# use it for OS locations: "Windows" as a basename also drops a user folder
# called Windows. Use skip_paths for those.
skip_dirs:
  - "$RECYCLE.BIN"
  - "System Volume Information"
  - ".git"
  - "$WinREAgent"
  # A WINDOWS build's compiled defaults leave this out, using the anchored
  # "?:/Windows" rule below instead. It stays in this FILE because setting
  # skip_dirs at all REPLACES the defaults on every platform: dropping it here
  # would take away the only OS-tree exclusion a Linux operator copying this
  # file has, since every skip_paths rule is "?:"-anchored to a drive letter and
  # can never match a POSIX path. On Windows, prefer deleting this line and
  # uncommenting skip_paths, which does not over-match a user folder.
  - "Windows"
  - "node_modules"
  - "index_out"        # never index our own output
  - ".venv"
  - "venv"
  - "site-packages"
  - "__pycache__"

# skip_paths matches a directory's FULL PATH, case-insensitively, as a whole —
# a hit prunes that directory and everything under it. "*" matches within one
# segment and never crosses a separator; a leading "?:" matches any drive
# letter; "/" and "\" are interchangeable.
#
# Left COMMENTED OUT on purpose. This list is already the compiled default on a
# Windows build, so uncommenting it unchanged buys nothing; on Linux the default
# is empty, and enabling ten "?:"-anchored patterns there only adds a per
# directory match that can never hit. Uncomment when you want to CHANGE the set
# — an explicit list replaces the defaults rather than extending them.
#
# Only the AppData segment of a user profile is excluded: Documents, Desktop and
# the rest of C:\Users\<name> are still indexed.
# skip_paths:
#   - "?:/Windows"
#   - "?:/Program Files"
#   - "?:/Program Files (x86)"
#   - "?:/ProgramData"
#   - "?:/Users/*/AppData"
#   - "?:/$WinREAgent"
#   - "?:/Recovery"
#   - "?:/PerfLogs"
#   - "?:/System Volume Information"
#   - "?:/$Recycle.Bin"
skip_exts:                   # never open for content (still indexed by name)
  - ".sys"
  - ".dll"
  - ".exe"
  - ".iso"
  - ".vmdk"
  - ".lock"
follow_symlinks: false       # never follow junctions/symlinks (avoids loops)

services:
  indexing:
    build:
      context: .
    image: llm-indexing:rust
    init: true
    read_only: true
    user: "10001:10001"
    ports:
      - "127.0.0.1:9801:9801"
    environment:
      RUST_LOG: info
      INDEX_ALLOWED_ROOTS: /input
      INDEX_DEFAULT_PATHS: /input
    volumes:
      - ${INDEX_INPUT:-./input}:/input:ro
      - ${INDEX_OUTPUT:-./output}:/output
    tmpfs:
      - /tmp:size=1g,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped
